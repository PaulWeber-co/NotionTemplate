<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti Procrastinator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ════════════ HEADER ════════════ -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-mark">AP</div>
        Anti Procrastinator
      </div>
      <div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="clock-date" id="clockDate">---</div>
      </div>
    </div>
    <div class="header-right">
      <div class="weather">
        <span class="weather-icon" id="weatherIcon">--</span>
        <div>
          <div class="weather-temp" id="weatherTemp">--</div>
          <div class="weather-desc" id="weatherDesc">Laden...</div>
        </div>
      </div>
      <button class="btn-header" id="studienplanBtn">Studienplan</button>
      <button class="theme-toggle" id="themeToggle">Dark</button>
    </div>
  </header>

  <!-- ════════════ STUDIENPLAN MODAL ════════════ -->
  <div class="modal-overlay" id="studienplanOverlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">Studienplan Informatik B.Sc.</div>
          <div class="modal-subtitle" id="studienplanSummary">0 / 180 ECTS</div>
        </div>
        <button class="modal-close" id="studienplanClose">x</button>
      </div>
      <div class="modal-body" id="studienplanBody"></div>
      <div class="modal-footer">
        <div class="sp-avg-row">
          <span class="sp-avg-label">Gewichteter Notendurchschnitt</span>
          <span class="sp-avg-value" id="spAverage">--</span>
        </div>
        <div class="sp-avg-row">
          <span class="sp-avg-label">ECTS abgeschlossen</span>
          <span class="sp-avg-value" id="spEctsComplete">0 / 180</span>
        </div>
        <div class="sp-progress-bar">
          <div class="sp-progress-fill" id="spProgressFill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════ MAIN ════════════ -->
  <div class="main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value stat-accent" id="statTotal">0</div>
        <div class="stat-label">Gesamt</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-green" id="statDone">0</div>
        <div class="stat-label">Erledigt</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-orange" id="statOpen">0</div>
        <div class="stat-label">Offen</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-purple" id="statRate">0%</div>
        <div class="stat-label">Rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-green" id="statPoints">0 / 0</div>
        <div class="stat-label">Punkte</div>
      </div>
    </div>

    <!-- To-Do -->
    <div class="card">
      <div class="card-title">Aufgaben</div>
      <div class="todo-input-row">
        <label for="todoInput" class="sr-only">Aufgabe</label>
        <input type="text" id="todoInput" placeholder="Neue Aufgabe..." />
        <label for="todoDate" class="sr-only">Datum</label>
        <input type="date" id="todoDate" />
        <label for="todoCategory" class="sr-only">Kategorie</label>
        <select id="todoCategory">
          <option value="arbeit">Arbeit</option>
          <option value="persoenlich">Persönlich</option>
          <option value="gesundheit">Gesundheit</option>
          <option value="lernen">Lernen</option>
        </select>
        <label for="todoPoints" class="sr-only">Story Points</label>
        <select id="todoPoints">
          <option value="1">1 pt</option>
          <option value="2">2 pt</option>
          <option value="3">3 pt</option>
          <option value="5">5 pt</option>
        </select>
        <button class="btn btn-primary" id="todoAdd">Hinzufügen</button>
      </div>
      <div class="todo-filters">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="today">Heute</button>
        <button class="filter-btn" data-filter="open">Offen</button>
        <button class="filter-btn" data-filter="done">Erledigt</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <!-- Kalender -->
    <div class="card">
      <div class="card-title">Kalender</div>
      <div class="calendar-nav">
        <button class="calendar-nav-btn" id="calPrev">&lt;</button>
        <span class="calendar-month-label" id="calMonthLabel">---</span>
        <button class="calendar-nav-btn" id="calNext">&gt;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Wöchentlicher Fortschritt</div>
        <div class="chart-container">
          <canvas id="lineChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Kategorien</div>
        <div class="chart-container">
          <canvas id="donutChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <!-- MVC Scripts -->
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>
  <script>
    Controller.init();
  </script>
</body>
</html>
